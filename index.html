<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎯 Android Fragments - Interactive Visual Guide</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header Styles */
        .header {
            text-align: center;
            color: white;
            padding: 40px 20px;
            animation: fadeInDown 1s ease;
        }

        .header h1 {
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.2em;
            opacity: 0.95;
        }

        /* Navigation Tabs */
        .nav-tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 15px 30px;
            border: none;
            border-radius: 50px;
            background: rgba(255,255,255,0.2);
            color: white;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            border: 2px solid transparent;
        }

        .tab-btn:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-3px);
        }

        .tab-btn.active {
            background: white;
            color: #667eea;
            border-color: #667eea;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        /* Main Content Area */
        .content-area {
            background: rgba(255,255,255,0.95);
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            animation: slideInUp 0.5s ease;
        }

        /* Fragment Demo Section */
        .demo-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        /* Device Frame */
        .device-frame {
            background: #1a1a1a;
            border-radius: 40px;
            padding: 20px;
            box-shadow: 0 30px 40px rgba(0,0,0,0.3);
            position: relative;
            overflow: hidden;
        }

        .device-screen {
            background: linear-gradient(145deg, #f0f0f0, #ffffff);
            border-radius: 30px;
            padding: 20px;
            min-height: 500px;
            position: relative;
            overflow: hidden;
        }

        /* Fragment Container */
        .fragment-container {
            width: 100%;
            height: 400px;
            background: white;
            border-radius: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
        }

        /* Individual Fragments */
        .fragment {
            width: 100%;
            height: 100%;
            padding: 20px;
            transition: transform 0.5s ease, opacity 0.5s ease;
            position: absolute;
            top: 0;
            left: 0;
        }

        .fragment-1 {
            background: linear-gradient(135deg, #667eea, #764ba2);
            transform: translateX(0);
        }

        .fragment-2 {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            transform: translateX(100%);
        }

        .fragment.active {
            transform: translateX(0);
        }

        .fragment.inactive {
            transform: translateX(-100%);
        }

        /* Fragment Content */
        .fragment-content {
            color: white;
            text-align: center;
            padding: 40px 20px;
        }

        .fragment-content h2 {
            font-size: 2em;
            margin-bottom: 20px;
        }

        .fragment-content .icon {
            font-size: 4em;
            margin-bottom: 20px;
            animation: bounce 2s infinite;
        }

        /* Control Buttons */
        .control-panel {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
        }

        .control-btn {
            padding: 12px 25px;
            border: none;
            border-radius: 25px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .control-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .control-btn:active {
            transform: translateY(0);
        }

        /* Lifecycle Visualization */
        .lifecycle-visual {
            background: linear-gradient(145deg, #2a2a2a, #1a1a1a);
            border-radius: 20px;
            padding: 20px;
            color: white;
        }

        .lifecycle-steps {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 20px 0;
        }

        .lifecycle-step {
            flex: 1;
            min-width: 80px;
            padding: 10px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            text-align: center;
            font-size: 0.9em;
            transition: all 0.3s ease;
        }

        .lifecycle-step.active {
            background: #4CAF50;
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(76, 175, 80, 0.4);
        }

        /* Code Panel */
        .code-panel {
            background: #1e1e1e;
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
        }

        .code-header {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .dot-red { background: #ff5f56; }
        .dot-yellow { background: #ffbd2e; }
        .dot-green { background: #27c93f; }

        pre {
            color: #fff;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.5;
            overflow-x: auto;
        }

        /* Feature Cards */
        .feature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .feature-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .feature-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
        }

        .feature-icon {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        /* Animations */
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-30px);}
            60% {transform: translateY(-15px);}
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .demo-section {
                grid-template-columns: 1fr;
            }
            
            .header h1 {
                font-size: 2em;
            }
            
            .tab-btn {
                padding: 10px 20px;
                font-size: 0.9em;
            }
        }

        /* Real Apps Section */
        .apps-showcase {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }

        .app-card {
            background: linear-gradient(145deg, #667eea, #764ba2);
            padding: 20px;
            border-radius: 15px;
            color: white;
            text-align: center;
            animation: pulse 3s infinite;
        }

        /* Back Stack Visual */
        .back-stack {
            display: flex;
            flex-direction: row-reverse;
            justify-content: center;
            gap: 5px;
            margin: 20px 0;
        }

        .stack-item {
            width: 60px;
            height: 60px;
            background: #667eea;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            transition: all 0.3s ease;
            animation: slideInRight 0.5s ease;
        }

        @keyframes slideInRight {
            from {
                transform: translateX(50px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🎯 Android Fragments</h1>
            <p>Interactive Visual Guide - Learn by Playing!</p>
        </div>

        <!-- Navigation Tabs -->
        <div class="nav-tabs">
            <button class="tab-btn active" onclick="switchTab('basics')">📚 Basics</button>
            <button class="tab-btn" onclick="switchTab('demo')">🎮 Live Demo</button>
            <button class="tab-btn" onclick="switchTab('examples')">🌟 Real Apps</button>
            <button class="tab-btn" onclick="switchTab('best-practices')">💡 Best Practices</button>
        </div>

        <!-- Main Content -->
        <div class="content-area" id="content-area">
            <!-- Dynamic content will be loaded here -->
        </div>
    </div>

    <script>
        // State management
        let currentFragment = 1;
        let backStack = [1];
        let currentTab = 'basics';

        // Initialize the page
        document.addEventListener('DOMContentLoaded', () => {
            loadTabContent('basics');
            startLifecycleSimulation();
        });

        // Tab switching function
        function switchTab(tabName) {
            currentTab = tabName;
            
            // Update active tab button
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.textContent.toLowerCase().includes(tabName.replace('-', ' '))) {
                    btn.classList.add('active');
                }
            });

            // Load tab content
            loadTabContent(tabName);
        }

        // Load content based on tab
        function loadTabContent(tabName) {
            const contentArea = document.getElementById('content-area');
            
            const content = {
                basics: getBasicsContent(),
                demo: getDemoContent(),
                examples: getExamplesContent(),
                'best-practices': getBestPracticesContent()
            };

            contentArea.innerHTML = content[tabName] || content.basics;
            
            // Reinitialize any needed functionality
            if (tabName === 'demo') {
                initializeDemo();
            }
        }

        // Get Basics Content
        function getBasicsContent() {
            return `
                <div style="animation: slideInUp 0.5s ease">
                    <h2 style="color: #333; margin-bottom: 20px; font-size: 2em;">📚 Understanding Fragments</h2>
                    
                    <div class="feature-grid">
                        <div class="feature-card" onclick="highlightConcept('modular')">
                            <div class="feature-icon">🧩</div>
                            <h3>Modularity</h3>
                            <p>Break UI into independent, reusable components</p>
                        </div>
                        <div class="feature-card" onclick="highlightConcept('reuse')">
                            <div class="feature-icon">🔄</div>
                            <h3>Reusability</h3>
                            <p>Use same fragment in multiple activities</p>
                        </div>
                        <div class="feature-card" onclick="highlightConcept('dynamic')">
                            <div class="feature-icon">🎭</div>
                            <h3>Dynamic UI</h3>
                            <p>Swap fragments at runtime</p>
                        </div>
                        <div class="feature-card" onclick="highlightConcept('adapt')">
                            <div class="feature-icon">📱💻</div>
                            <h3>Screen Adaptation</h3>
                            <p>Optimize for phones & tablets</p>
                        </div>
                    </div>

                    <div class="code-panel" style="margin-top: 30px;">
                        <div class="code-header">
                            <span class="dot dot-red"></span>
                            <span class="dot dot-yellow"></span>
                            <span class="dot dot-green"></span>
                        </div>
                        <pre><code style="color: #fff;">// 🎯 Fragment Definition
public class MyFragment extends Fragment {
    @Override
    public View onCreateView(LayoutInflater inflater, 
                             ViewGroup container,
                             Bundle savedInstanceState) {
        return inflater.inflate(R.layout.fragment_layout, 
                               container, false);
    }
}</code></pre>
                    </div>

                    <div class="lifecycle-visual" style="margin-top: 30px;">
                        <h3 style="color: white; margin-bottom: 15px;">🔄 Fragment Lifecycle</h3>
                        <div class="lifecycle-steps" id="lifecycle-demo">
                            <div class="lifecycle-step">onAttach</div>
                            <div class="lifecycle-step">onCreate</div>
                            <div class="lifecycle-step">onCreateView</div>
                            <div class="lifecycle-step">onViewCreated</div>
                            <div class="lifecycle-step">onStart</div>
                            <div class="lifecycle-step">onResume</div>
                            <div class="lifecycle-step">⚡ Active</div>
                        </div>
                    </div>
                </div>
            `;
        }

        // Get Demo Content
        function getDemoContent() {
            return `
                <div style="animation: slideInUp 0.5s ease">
                    <h2 style="color: #333; margin-bottom: 20px;">🎮 Live Fragment Demo</h2>
                    
                    <div class="demo-section">
                        <!-- Device Frame -->
                        <div class="device-frame">
                            <div class="device-screen">
                                <div class="fragment-container" id="fragmentContainer">
                                    <div class="fragment fragment-1 active" id="frag1">
                                        <div class="fragment-content">
                                            <div class="icon">🏠</div>
                                            <h2>Home Fragment</h2>
                                            <p>Welcome to the main screen!</p>
                                            <div style="margin-top: 30px;">
                                                <span style="background: rgba(255,255,255,0.2); padding: 10px 20px; border-radius: 25px;">
                                                    📊 Content Area
                                                </span>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="fragment fragment-2" id="frag2">
                                        <div class="fragment-content">
                                            <div class="icon">👤</div>
                                            <h2>Profile Fragment</h2>
                                            <p>User profile information</p>
                                            <div style="margin-top: 30px;">
                                                <span style="background: rgba(255,255,255,0.2); padding: 10px 20px; border-radius: 25px;">
                                                    ⭐ User Stats
                                                </span>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div class="control-panel">
                                    <button class="control-btn" onclick="swapFragment(1)">
                                        <span>🏠</span> Home Fragment
                                    </button>
                                    <button class="control-btn" onclick="swapFragment(2)">
                                        <span>👤</span> Profile Fragment
                                    </button>
                                    <button class="control-btn" onclick="goBack()">
                                        <span>↩️</span> Back
                                    </button>
                                </div>
                            </div>
                        </div>

                        <!-- Info Panel -->
                        <div>
                            <div class="lifecycle-visual">
                                <h3 style="margin-bottom: 15px;">📊 Back Stack</h3>
                                <div class="back-stack" id="backStack">
                                    ${backStack.map(frag => `<div class="stack-item">F${frag}</div>`).join('')}
                                </div>
                                
                                <h3 style="margin: 20px 0 15px;">🔄 Current Transaction</h3>
                                <div class="code-panel">
                                    <pre><code>// Replace fragment
FragmentTransaction transaction = 
    fragmentManager.beginTransaction();
transaction.replace(R.id.container, 
    new Fragment${currentFragment}());
transaction.addToBackStack(null);
transaction.commit();</code></pre>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        // Get Examples Content
        function getExamplesContent() {
            return `
                <div style="animation: slideInUp 0.5s ease">
                    <h2 style="color: #333; margin-bottom: 20px;">🌟 Real-World Apps Using Fragments</h2>
                    
                    <div class="apps-showcase">
                        <div class="app-card">
                            <div style="font-size: 3em; margin-bottom: 10px;">💬</div>
                            <h3>WhatsApp</h3>
                            <p>Chats, Status, Calls tabs</p>
                        </div>
                        <div class="app-card">
                            <div style="font-size: 3em; margin-bottom: 10px;">📸</div>
                            <h3>Instagram</h3>
                            <p>Home, Search, Reels, Profile</p>
                        </div>
                        <div class="app-card">
                            <div style="font-size: 3em; margin-bottom: 10px;">🎲</div>
                            <h3>Ludo Star</h3>
                            <p>Game board, Chat, Player profiles</p>
                        </div>
                        <div class="app-card">
                            <div style="font-size: 3em; margin-bottom: 10px;">📧</div>
                            <h3>Gmail</h3>
                            <p>List/Detail master-detail flow</p>
                        </div>
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px;">
                        <div class="device-frame" style="background: #2d2d2d;">
                            <div style="color: white; padding: 20px; text-align: center;">
                                <h3>📱 Phone Layout</h3>
                                <div style="background: #3d3d3d; border-radius: 15px; padding: 20px; margin-top: 15px;">
                                    <div style="background: #667eea; padding: 15px; border-radius: 10px; margin-bottom: 10px;">
                                        List Fragment
                                    </div>
                                    <div style="background: #764ba2; padding: 15px; border-radius: 10px;">
                                        Detail Activity (New)
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <div class="device-frame" style="background: #2d2d2d;">
                            <div style="color: white; padding: 20px; text-align: center;">
                                <h3>💻 Tablet Layout</h3>
                                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px;">
                                    <div style="background: #667eea; padding: 15px; border-radius: 10px;">
                                        List Fragment
                                    </div>
                                    <div style="background: #764ba2; padding: 15px; border-radius: 10px;">
                                        Detail Fragment
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        // Get Best Practices Content
        function getBestPracticesContent() {
            return `
                <div style="animation: slideInUp 0.5s ease">
                    <h2 style="color: #333; margin-bottom: 20px;">💡 Fragment Best Practices</h2>
                    
                    <div class="feature-grid">
                        <div class="feature-card">
                            <div class="feature-icon">🗃️</div>
                            <h3>Use Back Stack</h3>
                            <p>Always add transactions to back stack for natural navigation</p>
                        </div>
                        <div class="feature-card">
                            <div class="feature-icon">🎨</div>
                            <h3>Custom Animations</h3>
                            <p>setCustomAnimations() for smooth transitions</p>
                        </div>
                        <div class="feature-card">
                            <div class="feature-icon">🔄</div>
                            <h3>Interface Communication</h3>
                            <p>Use interfaces to communicate with Activity</p>
                        </div>
                        <div class="feature-card">
                            <div class="feature-icon">⚡</div>
                            <h3>Lazy Loading</h3>
                            <p>Load data in onViewCreated(), not onCreateView()</p>
                        </div>
                    </div>

                    <div class="code-panel" style="margin-top: 30px;">
                        <div class="code-header">
                            <span class="dot dot-red"></span>
                            <span class="dot dot-yellow"></span>
                            <span class="dot dot-green"></span>
                        </div>
                        <pre><code style="color: #fff;">// ✅ Best Practice: Interface Communication
public class ItemFragment extends Fragment {
    interface OnItemSelectedListener {
        void onItemSelected(String itemId);
    }
    
    private OnItemSelectedListener listener;
    
    @Override
    public void onAttach(Context context) {
        super.onAttach(context);
        listener = (OnItemSelectedListener) context;
    }
    
    private void itemClicked(String id) {
        listener.onItemSelected(id);
    }
}</code></pre>
                    </div>

                    <div style="background: linear-gradient(135deg, #f093fb, #f5576c); padding: 20px; border-radius: 15px; margin-top: 30px; color: white;">
                        <h3 style="margin-bottom: 10px;">⚠️ Common Pitfalls to Avoid</h3>
                        <ul style="list-style-type: none;">
                            <li style="margin: 10px 0;">❌ Don't create memory leaks with static references</li>
                            <li style="margin: 10px 0;">❌ Don't load heavy data in onCreateView()</li>
                            <li style="margin: 10px 0;">❌ Don't forget to clear bindings in onDestroyView()</li>
                            <li style="margin: 10px 0;">❌ Don't assume fragment is attached to activity</li>
                        </ul>
                    </div>
                </div>
            `;
        }

        // Demo Functions
        function swapFragment(fragmentNumber) {
            const frag1 = document.getElementById('frag1');
            const frag2 = document.getElementById('frag2');
            
            // Animate fragment swap
            if (fragmentNumber === 1) {
                frag1.classList.add('active');
                frag1.classList.remove('inactive');
                frag2.classList.add('inactive');
                frag2.classList.remove('active');
            } else {
                frag2.classList.add('active');
                frag2.classList.remove('inactive');
                frag1.classList.add('inactive');
                frag1.classList.remove('active');
            }
            
            // Update back stack
            backStack.push(fragmentNumber);
            currentFragment = fragmentNumber;
            updateBackStack();
            
            // Animate the button
            event.target.style.animation = 'pulse 0.3s ease';
            setTimeout(() => {
                event.target.style.animation = '';
            }, 300);
        }

        function goBack() {
            if (backStack.length > 1) {
                backStack.pop();
                const previousFragment = backStack[backStack.length - 1];
                swapFragment(previousFragment);
            }
        }

        function updateBackStack() {
            const backStackElement = document.getElementById('backStack');
            if (backStackElement) {
                backStackElement.innerHTML = backStack.map(frag => 
                    `<div class="stack-item">F${frag}</div>`
                ).join('');
            }
        }

        function initializeDemo() {
            backStack = [1];
            currentFragment = 1;
            updateBackStack();
            
            // Reset fragments
            const frag1 = document.getElementById('frag1');
            const frag2 = document.getElementById('frag2');
            if (frag1 && frag2) {
                frag1.classList.add('active');
                frag1.classList.remove('inactive');
                frag2.classList.add('inactive');
                frag2.classList.remove('active');
            }
        }

        function highlightConcept(concept) {
            const concepts = {
                modular: '🧩 Modularity: Break UI into independent pieces',
                reuse: '🔄 Reusability: Write once, use everywhere',
                dynamic: '🎭 Dynamic UI: Swap fragments at runtime',
                adapt: '📱💻 Screen Adaptation: One codebase, all devices'
            };
            
            alert(concepts[concept] || 'Learn more about this concept!');
        }

        // Lifecycle simulation
        function startLifecycleSimulation() {
            const steps = document.querySelectorAll('.lifecycle-step');
            let index = 0;
            
            setInterval(() => {
                steps.forEach(step => step.classList.remove('active'));
                if (steps[index]) {
                    steps[index].classList.add('active');
                }
                index = (index + 1) % steps.length;
            }, 1000);
        }
    </script>
</body>
</html>
